# .golangci.yml - v1 configuration for Go 1.24
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - godot
    - whitespace
    - gci
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/codedsultan/goravel-notification
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/goravel/framework)
      - prefix(github.com/codedsultan/goravel-notification)
  godot:
    scope: declarations
    capital: true
  misspell:
    locale: US
  revive:
    rules:
      - name: var-naming
        severity: warning
        disabled: false
        exclude:
          - "Html$"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - godot
    - path: mocks/
      linters:
        - all
  max-issues-per-linter: 50
  max-same-issues: 5