on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"  
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          # Run tests and collect coverage
          go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic \
            ./channels/... \
            ./notification/...
          
          # If coverage.out exists, convert it to a format Codecov can use
          if [ -f coverage.out ]; then
            # Remove any lines from packages without tests
            grep -v "no such tool" coverage.out > coverage.clean.out || true
            mv coverage.clean.out coverage.out
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          name: goravel-notifications
          fail_ci_if_error: false
          verbose: true