name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable  # This will use Go 1.25+
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # version: v2  # Changed from v1.64 to v2 for Go 1.25 support
          args: --timeout=5m --modules-download-mode=readonly
          only-new-issues: true