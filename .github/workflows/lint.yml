name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"  # Changed from 'stable' to exact version
          cache: true          # Changed from false to true
      
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7  # Changed from v6 to v7
        with:
          version: v2.8.0  # Added specific v2 version
          args: --timeout=5m --modules-download-mode=readonly
          only-new-issues: true