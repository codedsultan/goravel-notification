name: Check PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types allowed — mirrors goravel/framework conventions
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert
          # Require a scope, e.g. feat(mail): add HTML support
          requireScope: false
          # Subject must not start with uppercase
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must not start with an uppercase letter.
            Example: "feat(channels): add SMS channel support"
          wip: true
          validateSingleCommit: false
