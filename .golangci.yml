# .golangci.yml — complete working v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - godot
    - revive  # replacement for some older linters
  settings:
    misspell:
      locale: US
    godot:
      scope: declarations
      capital: true

formatters:
  enable:
    - gofmt
    - goimports
    - gci
  settings:
    goimports:
      local-prefixes:
        - github.com/codedsultan/goravel-notification
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/goravel/framework)
        - prefix(github.com/codedsultan/goravel-notification)

issues:
  max-issues-per-linter: 50
  max-same-issues: 5