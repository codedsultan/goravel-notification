version: "2"
run:
  tests: true
linters:
  enable:
    - godot
    - misspell
    - revive
    - whitespace
  settings:
    godot:
      scope: declarations
      capital: true
    misspell:
      locale: US
    revive:
      rules:
        - name: var-naming
          severity: warning
          disabled: false
          exclude:
            - Html$
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - godot
        path: _test\.go
      - linters:
          - all
        path: mocks/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 5
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/goravel/framework)
        - prefix(github.com/codedsultan/goravel-notification)
    goimports:
      local-prefixes:
        - github.com/codedsultan/goravel-notification
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
